apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: order-service-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/srinu-info/flower-store-helm.git
    targetRevision: development
    path: order-service

    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: store

  syncPolicy:
    automated:
      prune: true
      selfHeal: true