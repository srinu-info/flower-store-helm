apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ .Values.namespace }}
  labels:
    project: online-store
    component: auth-service
spec:
  selector:
    project: online-store
    component: auth-service
  ports:
    - protocol: TCP
      port:  {{ .Values.service.port }}
      targetPort:  {{ .Values.service.targetPort }}