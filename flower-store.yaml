apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: flower-store
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/srinu-info/flower-store-helm.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: store


  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true