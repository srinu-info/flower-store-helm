apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    project: online-store
    component: frontend
spec:
  type: LoadBalancer
  selector:
    project: online-store
    component: frontend
  ports:
    - protocol: TCP
      port:  {{ .Values.service.port }}
      targetPort:  {{ .Values.service.targetPort }}