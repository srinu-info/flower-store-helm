apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    project: online-store
    component: api-gateway
spec:
  selector:
    project: online-store
    component: api-gateway
  ports:
    - protocol: TCP
      port:  {{ .Values.service.port }}
      targetPort:  {{ .Values.service.targetPort }}