apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flower-store-ingress
  namespace: {{ .Values.namespace }}

  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":443}]'

    # Uncomment after creating ACM certificate
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}

    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}

    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.targetType }}

    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName }}

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:

  - host: {{ .Values.ingress.host }}

    http:

      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix

        backend:
          service:
            name: api-gateway
            port:
              number: 8080